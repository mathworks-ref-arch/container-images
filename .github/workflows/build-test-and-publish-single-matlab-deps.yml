name: Build Test and Publish a Matlab-Deps Image

# images build with this workflow are created with the following naming conventions:
# ${image_name}:${matlab_release}-${os}

# built images are pushed to DockerHub. Note: Both camel & Pascal case versions of tags are generated and published

# This workflow is only be triggered when called from another workflow.
on:
  workflow_dispatch:
    inputs:
      matlab_release_tag:
        description: "Name of the MATLAB release. Example: r2023a"
        required: true
        type: string
      os_info_tag:
        description: "MATLAB Deps os info tag. For example: aws-batch, debian13, ubi9, ubuntu24.04"
        required: true
        type: string
      is_default_os:
        description: "Specify whether the OS being tagged is desired default OS. For example, This field is used to configure that matlab-deps/r2023a should point to matlab-deps/r2023a-ubuntu24.04"
        required: true
        type: boolean
      should_add_latest_tag:
        description: "Specify if this image should also be tagged as latest"
        required: true
        type: boolean
      test_file_path:
        description: "Relative path to the root directory. Ex: ./tests/matlab-deps/test_ubuntu2204.py"
        required: false
        type: string
  
  workflow_call:
    inputs:
      matlab_release_tag:
        description: "Name of the MATLAB release. Example: r2023a"
        required: true
        type: string
      os_info_tag:
        description: "MATLAB Deps os info tag. For example: aws-batch, debian13, ubi9, ubuntu24.04"
        required: true
        type: string
      is_default_os:
        description: "Specify whether the OS being tagged is desired default OS. For example, This field is used to configure that matlab-deps/r2023a should point to matlab-deps/r2023a-ubuntu24.04"
        required: true
        type: boolean
      should_add_latest_tag:
        description: "Specify if this image should also be tagged as latest"
        required: true
        type: boolean
      test_file_path:
        description: "Relative path to the root directory. Ex: ./tests/matlab-deps/test_ubuntu2204.py"
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        description: "DockerHub username with permissions to push the image"
        required: true
      DOCKERHUB_TOKEN:
        description: "DockerHub token with permissions to push the image"
        required: true

env:
  image_name: mathworks/matlab-deps

jobs:
  build-test-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tags
        id: image_name_tags
        uses: ./.github/actions/gen-image-tags
        with:
          image_name: ${{ env.image_name }}
          release_tag: ${{ inputs.matlab_release_tag }}
          os_info_tag: ${{ inputs.os_info_tag }}
          is_default_os: ${{ inputs.is_default_os }}
          should_add_latest_tag: ${{ inputs.should_add_latest_tag }}
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: "./matlab-deps/${{ inputs.matlab_release_tag }}/${{ inputs.os_info_tag }}"
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image_name_tags.outputs.image_name_tags }}

      - name: Test Image
        uses: ./.github/actions/test-matlab-deps
        if: ${{ inputs.test_file_path != '' }}
        with:
          image_id: ${{ steps.build-image.outputs.imageid }}
          test_file_path: ${{ inputs.test_file_path }}
      
      - name: Push Image
        shell: bash
        run: docker push --all-tags ${{ env.image_name }}

